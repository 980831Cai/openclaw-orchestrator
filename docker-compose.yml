services:
  orchestrator:
    build: .
    container_name: openclaw-orchestrator
    ports:
      - "3721:3721"
    volumes:
      - openclaw-data:/root/.openclaw
    environment:
      - PORT=3721
      - OPENCLAW_HOME=/root/.openclaw
      # Gateway 连接配置（容器内 localhost 不是宿主机）
      # macOS/Windows: 使用 host.docker.internal
      # Linux: 使用 --network host 或宿主机 IP
      - OPENCLAW_GATEWAY_URL=ws://host.docker.internal:18789
      # 远程连接时设置 Gateway Token（本地连接自动放行）
      # - OPENCLAW_GATEWAY_TOKEN=your-token-here
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3721/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  openclaw-data:
    driver: local
